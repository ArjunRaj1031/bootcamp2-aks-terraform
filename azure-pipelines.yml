trigger:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

variables:
  workingDirectory: "environments/dev"
  serviceConnection: "azure-spn-connec"

stages:
  - stage: Terraform_Init_Validate
    displayName: "Terraform Init and Validate"
    jobs:
      - job: init_validate
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: "Install Terraform"
            inputs:
              terraformVersion: "latest"

          - task: TerraformTaskV4@4
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(workingDirectory)"
              backendServiceArm: "$(serviceConnection)"
              backendAzureRmResourceGroupName: "demo-aks-backend"
              backendAzureRmStorageAccountName: "backendarjun1432026"
              backendAzureRmContainerName: "demo"
              backendAzureRmKey: "dev.terraform.tfstate"

          - task: TerraformTaskV4@4
            displayName: "Terraform Validate"
            inputs:
              provider: "azurerm"
              command: "validate"
              workingDirectory: "$(workingDirectory)"

  - stage: Terraform_Plan
    displayName: "Terraform Plan"
    dependsOn: Terraform_Init_Validate
    jobs:
      - job: plan
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: "latest"

          - task: TerraformTaskV4@4
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(workingDirectory)"
              backendServiceArm: "$(serviceConnection)"
              backendAzureRmResourceGroupName: "demo-aks-backend"
              backendAzureRmStorageAccountName: "backendarjun1432026"
              backendAzureRmContainerName: "demo"
              backendAzureRmKey: "dev.terraform.tfstate"

          - task: TerraformTaskV4@4
            displayName: "Terraform Plan"
            inputs:
              provider: "azurerm"
              command: "plan"
              workingDirectory: "$(workingDirectory)"
              environmentServiceNameAzureRM: "$(serviceConnection)"
              commandOptions: "-var-file=dev.tfvars"

  - stage: Terraform_Apply
    displayName: "Terraform Apply"
    dependsOn: Terraform_Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: apply
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: "latest"

          - task: TerraformTaskV4@4
            displayName: "Terraform Init"
            inputs:
              provider: "azurerm"
              command: "init"
              workingDirectory: "$(workingDirectory)"
              backendServiceArm: "$(serviceConnection)"
              backendAzureRmResourceGroupName: "demo-aks-backend"
              backendAzureRmStorageAccountName: "backendarjun1432026"
              backendAzureRmContainerName: "demo"
              backendAzureRmKey: "dev.terraform.tfstate"

          - task: TerraformTaskV4@4
            displayName: "Terraform Apply"
            inputs:
              provider: "azurerm"
              command: "apply"
              workingDirectory: "$(workingDirectory)"
              environmentServiceNameAzureRM: "$(serviceConnection)"
              commandOptions: "-var-file=dev.tfvars -auto-approve"